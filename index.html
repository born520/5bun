<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="양산시 달빛어린이병원 지정을 위한 제언">
    <meta property="og:description" content="양산시의회 송은영 의원 5분 자유 발언 - 달빛어린이병원 지정 촉구">
    <meta property="og:image" content="thumbnail.jpg"> 
    <meta property="og:type" content="website">

    <title>양산시 달빛어린이병원 지정을 위한 제언</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
        }

        /* 9:16 비율의 쇼츠 컨테이너 */
        .video-container {
            position: relative;
            width: 100%;
            max-width: 450px; 
            aspect-ratio: 9 / 16;
            background-color: #1a1a1a;
            overflow: hidden;
        }

        /* 유튜브 iframe */
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 유튜브 원본 썸네일 덮개 */
        .thumbnail-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 유튜브 고화질 썸네일 주소 (ID: vuusdvx431I) */
            background-image: url('https://img.youtube.com/vi/vuusdvx431I/maxresdefault.jpg');
            background-size: cover;
            background-position: center;
            cursor: pointer;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 재생 버튼 */
        .play-button {
            width: 70px;
            height: 70px;
            background: rgba(255, 0, 0, 0.9);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        .play-button::after {
            content: '';
            border-style: solid;
            border-width: 12px 0 12px 20px;
            border-color: transparent transparent transparent white;
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <div id="thumbnail" class="thumbnail-overlay" onclick="playVideo()">
            <div class="play-button"></div>
        </div>

        <div id="player"></div>
    </div>

    <script>
        function playVideo() {
            document.getElementById('thumbnail').style.display = 'none';
            const playerDiv = document.getElementById('player');
            // 쇼츠 느낌을 위해 autoplay와 동시에 음소거(mute=1)를 권장하지만, 
            // 클릭 후 재생이므로 소리가 나오도록 기본 설정했습니다.
            playerDiv.innerHTML = `
                <iframe 
                    src="https://www.youtube.com/embed/vuusdvx431I?autoplay=1&rel=0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>`;
        }
    </script>
</body>
</html>
