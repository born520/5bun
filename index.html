<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>양산시 달빛어린이병원 지정을 위한 제언</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
            font-family: sans-serif;
        }

        /* 9:16 비율의 쇼츠 컨테이너 */
        .video-container {
            position: relative;
            width: 100%;
            max-width: 450px; /* 모바일/PC에서 적절한 너비 */
            aspect-ratio: 9 / 16;
            background-color: #1a1a1a;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* 유튜브 iframe */
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 커스텀 썸네일 덮개 */
        .thumbnail-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 재생 버튼 아이콘 (선택 사항) */
        .play-button {
            width: 80px;
            height: 80px;
            background: rgba(255, 0, 0, 0.9);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
        }
        .play-button::after {
            content: '';
            border-style: solid;
            border-width: 15px 0 15px 25px;
            border-color: transparent transparent transparent white;
            margin-left: 5px;
        }
        .thumbnail-overlay:hover .play-button {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="video-container">
        <div id="thumbnail" class="thumbnail-overlay" 
             style="background-image: url('thumbnail.jpg');" 
             onclick="playVideo()">
            <div class="play-button"></div>
        </div>

        <div id="player"></div>
    </div>

    <script>
        function playVideo() {
            // 썸네일을 숨깁니다.
            document.getElementById('thumbnail').style.display = 'none';
            
            // 유튜브 영상을 자동으로 재생하는 iframe을 생성합니다.
            const playerDiv = document.getElementById('player');
            playerDiv.innerHTML = `
                <iframe 
                    src="https://www.youtube.com/embed/vuusdvx431I?autoplay=1&rel=0" 
                    title="양산시 달빛어린이병원 지정을 위한 제언"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen>
                </iframe>`;
        }
    </script>
</body>
</html>
